# gh-masto-poster configuration
# Copy to config.ini and fill in your credentials.

[github]
# GitHub personal access token (or set GITHUB_TOKEN env var)
token =
# Your GitHub username
username =
# Repos to monitor (comma-separated). Leave empty to discover all.
# Example: owner/repo1, owner/repo2
repos =

[mastodon]
# Your Mastodon instance URL (no trailing slash)
instance_url = https://mastodon.social
# Mastodon access token (or set MASTODON_TOKEN env var)
access_token =
# Default post visibility: public, unlisted, private, direct
default_visibility = public

[daemon]
# Seconds between Atom feed polls (no rate limit, can be frequent)
feed_interval = 60
# Seconds between GitHub API polls (rate-limited to 5000 req/hour)
api_interval = 300
# Seconds between notification polls (server may enforce higher via X-Poll-Interval)
notification_interval = 60
# Path to JSON state file for deduplication
state_file = state.json
# Logging level: DEBUG, INFO, WARNING, ERROR
log_level = INFO

[events]
# Enable/disable event types (true/false)
releases = true
commits = true
issues = true
pull_requests = true
stars = false
forks = false
comments = true
reviews = true
discussions = true
wiki = false
tags = true
branches = false
security = true
ci = false
invitations = false

[templates]
# Override default templates per event type (Jinja2 syntax).
# Available variables: repo, actor, title, url, body, body_truncated,
#   ref, ref_type, tag, branch, action, count, commit_messages,
#   issue_title, pr_title, page_title, member, created_at
;
; releases = New release {{ ref }} of {{ repo }}: {{ title }}\n\n{{ body_truncated }}\n\n{{ url }}
; commits = {{ count }} new commit(s) to {{ repo }}/{{ branch }}\n\n{{ commit_messages }}\n\n{{ url }}
; tags = {% if ref_type == 'tag' %}New tag {{ ref }} in {{ repo }}{% else %}New branch {{ ref }} in {{ repo }}{% endif %}\n\n{{ url }}
; issues = Issue {{ action }}: {{ title }} in {{ repo }}\n\n{{ url }}
; comments = Comment on {{ issue_title }} in {{ repo }}\n\n{{ url }}
; pull_requests = PR {{ action }}: {{ title }} in {{ repo }}\n\n{{ url }}
; reviews = PR review on {{ pr_title }} in {{ repo }}\n\n{{ url }}
; stars = {{ actor }} starred {{ repo }}
; forks = {{ actor }} forked {{ repo }}\n\n{{ url }}
; wiki = Wiki updated in {{ repo }}: {{ page_title }}\n\n{{ url }}
; discussions = Discussion: {{ title }} in {{ repo }}\n\n{{ url }}
; security = Security alert in {{ repo }}: {{ title }}\n\n{{ url }}
; ci = CI run in {{ repo }}: {{ title }}\n\n{{ url }}
; invitations = Repository invitation: {{ title }}\n\n{{ url }}

[visibility]
# Override visibility per event type
; security = unlisted

[content_warning]
# Content warning (spoiler_text) per event type
; security = Security Advisory
