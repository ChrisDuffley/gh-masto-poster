# gh-masto-poster configuration
# Copy to config.ini and fill in your credentials.

[github]
# GitHub personal access token (or set GITHUB_TOKEN env var)
token =
# Your GitHub username
username =
# Repos to monitor (comma-separated). Leave empty to discover all.
# Example: owner/repo1, owner/repo2
repos =

[mastodon]
# Your Mastodon instance URL (no trailing slash)
instance_url = https://mastodon.social
# Mastodon access token (or set MASTODON_TOKEN env var)
access_token =
# Default post visibility: public, unlisted, private, direct
default_visibility = public

[daemon]
# Seconds between poll cycles
poll_interval = 120
# Path to JSON state file for deduplication
state_file = state.json
# Logging level: DEBUG, INFO, WARNING, ERROR
log_level = INFO

[events]
# Enable/disable event types (true/false)
releases = true
commits = true
issues = true
pull_requests = true
stars = false
forks = false
comments = true
reviews = true
discussions = true
wiki = false
tags = true
branches = false
security = true
ci = false
invitations = false

[templates]
# Override default templates per event type (Jinja2 syntax).
# Available variables: repo, actor, title, url, body, body_truncated,
#   ref, ref_type, tag, branch, action, count, commit_messages,
#   issue_title, pr_title, page_title, member, created_at
#
# Example:
; releases = 🚀 {{ repo }} {{ tag }}: {{ title }} — {{ url }}

[visibility]
# Override visibility per event type
; security = unlisted

[content_warning]
# Content warning (spoiler_text) per event type
; security = Security Advisory
# Content warning (spoiler_text) per event type
# security = "Security Advisory"
